version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gestores_ia_db
    environment:
      POSTGRES_DB: gestores_ia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./storage/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:Z

volumes:
  pgdata:
